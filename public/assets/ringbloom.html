<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Projected SDF Ring</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #111;
        }
    </style>

    <script type="importmap">
{
"imports":{
"three":"https://unpkg.com/three@0.160.0/build/three.module.js",
"three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"
}
}
</script>

</head>

<body>

    <script type="module">

        import * as THREE from "three"
        import { OrbitControls } from "three/addons/controls/OrbitControls.js"
        import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js"
        import { RenderPass } from "three/addons/postprocessing/RenderPass.js"
        import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js"


        // ---------- SCENE ----------

        const scene = new THREE.Scene()


        // ---------- CAMERA ----------

        const camera = new THREE.PerspectiveCamera(
            60,
            window.innerWidth / window.innerHeight,
            0.1,
            200
        )

        camera.position.set(0, 6, 10)


        // ---------- RENDERER ----------

        const renderer = new THREE.WebGLRenderer({ antialias: true })

        renderer.setSize(window.innerWidth, window.innerHeight)
        renderer.setPixelRatio(Math.min(window.devicePixelRatio * 1.5, 3))

        renderer.toneMapping = THREE.ACESFilmicToneMapping
        renderer.toneMappingExposure = 1

        document.body.appendChild(renderer.domElement)


        // ---------- CONTROLS ----------

        new OrbitControls(camera, renderer.domElement)


        // ---------- FLOOR ----------

        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(50, 50),
            new THREE.MeshStandardMaterial({ color: 0x333333 })
        )

        floor.rotation.x = -Math.PI / 2
        scene.add(floor)


        // ---------- RING PARAMETERS ----------

        const ringRadius = 20
        const ringWidth = 0.1


        // ---------- FULLSCREEN QUAD ----------

        const quadGeo = new THREE.PlaneGeometry(2, 2)

        const quadMat = new THREE.ShaderMaterial({

            transparent: true,
            depthWrite: false,

            uniforms: {
                cameraPos: { value: camera.position },
                radius: { value: ringRadius },
                width: { value: ringWidth },
                intensity: { value: 40 },
                invProj: { value: new THREE.Matrix4() },
                invView: { value: new THREE.Matrix4() }
            },

            vertexShader: `

varying vec2 vUv;

void main(){

vUv = uv;

gl_Position = vec4(position,1.0);

}

`,

            fragmentShader: `

varying vec2 vUv;

uniform vec3 cameraPos;
uniform float radius;
uniform float width;
uniform float intensity;

uniform mat4 invProj;
uniform mat4 invView;

void main(){

// screen uv -> NDC
vec2 uv = vUv * 2.0 - 1.0;

// create view ray
vec4 rayClip = vec4(uv,-1.0,1.0);
vec4 rayView = invProj * rayClip;

rayView = vec4(rayView.xy,-1.0,0.0);

// world ray
vec3 rayDir = normalize((invView * rayView).xyz);

// intersect ground plane y=0
float t = -cameraPos.y / rayDir.y;

if(t <= 0.0) discard;

vec3 worldPos = cameraPos + rayDir * t;

// ring sdf
float dist = length(worldPos.xz);

float d = abs(dist - radius);

// anti alias
float aa = fwidth(d);

float ring = smoothstep(width+aa,width-aa,d);

// glow
float glow = exp(-d * 25.0);

vec3 col = vec3(ring*intensity + glow*0.4);

gl_FragColor = vec4(col, ring);

}

`

        })

        quadMat.toneMapped = false

        const quad = new THREE.Mesh(quadGeo, quadMat)
        scene.add(quad)


        // ---------- BLOOM ----------

        const renderScene = new RenderPass(scene, camera)

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.6,
            0.6,
            0.15
        )

        const composer = new EffectComposer(renderer)

        composer.addPass(renderScene)
        composer.addPass(bloomPass)


        // ---------- RESIZE ----------

        window.addEventListener("resize", () => {

            camera.aspect = window.innerWidth / window.innerHeight
            camera.updateProjectionMatrix()

            renderer.setSize(window.innerWidth, window.innerHeight)
            composer.setSize(window.innerWidth, window.innerHeight)

        })


        // ---------- LOOP ----------

        function animate() {

            requestAnimationFrame(animate)

            // update matrices
            quadMat.uniforms.invProj.value.copy(camera.projectionMatrixInverse)
            quadMat.uniforms.invView.value.copy(camera.matrixWorld)

            composer.render()

        }

        animate()

    </script>

</body>

</html>
