<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>BUF Viewer</title>

    <style>
        body {
            margin: 0;
            background: #111
        }

        #file {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10
        }
    </style>

    <script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

</head>

<body>

    <input type="file" id="file">

    <script type="module">

        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";

        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(
            60,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );

        camera.position.set(2, 2, 3);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);

        scene.add(new THREE.GridHelper(10, 10));

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 5, 5);
        scene.add(light);

        let mesh;

        document.getElementById("file").addEventListener("change", (e) => {

            const file = e.target.files[0];

            const reader = new FileReader();

            reader.onload = function () {

                const buffer = reader.result;

                const float = new Float32Array(buffer);

                const stride = 8;
                const vertexCount = float.length / stride;

                console.log("vertexCount:", vertexCount);

                const positions = new Float32Array(vertexCount * 3);
                const normals = new Float32Array(vertexCount * 3);
                const uvs = new Float32Array(vertexCount * 2);

                for (let i = 0; i < vertexCount; i++) {

                    positions[i * 3] = float[i * stride]
                    positions[i * 3 + 1] = float[i * stride + 1]
                    positions[i * 3 + 2] = float[i * stride + 2]

                    normals[i * 3] = float[i * stride + 3]
                    normals[i * 3 + 1] = float[i * stride + 4]
                    normals[i * 3 + 2] = float[i * stride + 5]

                    uvs[i * 2] = float[i * stride + 6]
                    uvs[i * 2 + 1] = float[i * stride + 7]

                }

                const geometry = new THREE.BufferGeometry();

                geometry.setAttribute(
                    "position",
                    new THREE.BufferAttribute(positions, 3)
                );

                geometry.setAttribute(
                    "normal",
                    new THREE.BufferAttribute(normals, 3)
                );

                geometry.setAttribute(
                    "uv",
                    new THREE.BufferAttribute(uvs, 2)
                );

                const material = new THREE.MeshNormalMaterial();

                if (mesh) scene.remove(mesh);

                mesh = new THREE.Mesh(geometry, material);

                scene.add(mesh);

            };

            reader.readAsArrayBuffer(file);

        });

        function animate() {

            requestAnimationFrame(animate);

            renderer.render(scene, camera);

        }

        animate();

    </script>

</body>

</html>
